name: Статический анализ безопасности (SAST)

on:
  workflow_call:

permissions:
  security-events: write

jobs:
  semgrep-backend:
    name: Semgrep — анализ backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Semgrep scan
        uses: semgrep/semgrep-action@v1
        with:
          config: >
            p/spring
            p/java
            p/secrets
            p/owasp-top-ten
            .github/semgrep/backend-rules.yml
          generateSarif: "1"

      - name: Загрузка SARIF отчёта в GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep-backend

  semgrep-frontend:
    name: Semgrep — анализ frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Semgrep scan
        uses: semgrep/semgrep-action@v1
        with:
          config: >
            p/react
            p/typescript
            p/secrets
            p/owasp-top-ten
            .github/semgrep/frontend-rules.yml
          generateSarif: "1"

      - name: Загрузка SARIF отчёта в GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep-frontend
