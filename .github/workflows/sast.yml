name: Статический анализ безопасности (SAST)

on:
  workflow_call:

permissions:
  security-events: write
  contents: read

jobs:
  semgrep-backend:
    name: Semgrep — анализ backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Установка Semgrep
        run: pip install semgrep

      - name: Semgrep scan
        run: |
          semgrep scan \
            --config p/java \
            --config p/secrets \
            --config p/owasp-top-ten \
            --config .github/semgrep/backend-rules.yml \
            --sarif --output semgrep.sarif \
            --no-error
        continue-on-error: true

      - name: Загрузка SARIF отчёта в GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep-backend

  semgrep-frontend:
    name: Semgrep — анализ frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Установка Semgrep
        run: pip install semgrep

      - name: Semgrep scan
        run: |
          semgrep scan \
            --config p/react \
            --config p/typescript \
            --config p/secrets \
            --config p/owasp-top-ten \
            --config .github/semgrep/frontend-rules.yml \
            --sarif --output semgrep.sarif \
            --no-error
        continue-on-error: true

      - name: Загрузка SARIF отчёта в GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep-frontend
