name: UI-тесты (Selenium)

on:
  workflow_call:

permissions:
  contents: read

jobs:
  ui-tests:
    name: Selenium UI-тесты
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: chart_hedgehog/package-lock.json

      - name: Установка зависимостей frontend
        working-directory: chart_hedgehog
        run: npm ci

      - name: Сборка frontend
        working-directory: chart_hedgehog
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
        run: npm run build

      - name: Запуск frontend
        working-directory: chart_hedgehog
        run: |
          npm start &
          echo "Ожидание запуска frontend..."
          timeout 60 bash -c 'until curl -sf http://localhost:3000; do sleep 2; done'

      - name: Установка зависимостей UI-тестов
        working-directory: tests-ui
        run: npm ci

      - name: Запуск UI-тестов
        working-directory: tests-ui
        env:
          CI: "true"
          APP_URL: http://localhost:3000
          TEST_USERNAME: admin
          TEST_PASSWORD: admin123
        run: npm test -- --reporter spec --reporter-option output=test-results.txt || true

      - name: Загрузка результатов тестов
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-results
          path: tests-ui/test-results.txt
