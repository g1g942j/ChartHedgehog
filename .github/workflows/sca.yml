name: Композитный анализ (Dependency Checher)

on:
  workflow_call:
    secrets:
      NVD_API_KEY:
        required: false

jobs:
  java-sca:
    name: Анализ зависимостей backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: back
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Cache NVD database
        uses: actions/cache@v4
        with:
          path: back/.dependency-check-data
          key: dependency-check-nvd-${{ runner.os }}-${{ hashFiles('back/pom.xml') }}
          restore-keys: |
            dependency-check-nvd-${{ runner.os }}-

      - name: OWASP Dependency-Check
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: mvn -B dependency-check:check

      - name: Загрузка отчёта
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend отчёт проверки
          path: back/target/dependency-check-report.html

  npm-sca:
    name: Анализ зависимостей frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front
    steps:
      - uses: actions/checkout@v4

      - name: npm audit
        if: hashFiles('package.json', 'front/package.json') != ''
        run: npm audit --audit-level=high
