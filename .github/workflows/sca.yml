name: Композитный анализ (Dependency Checher)

on:
  workflow_call:
    secrets:
      NVD_API_KEY:
        required: false
      OSSINDEX_USERNAME:
        required: false
      OSSINDEX_TOKEN:
        required: false

jobs:
  java-sca:
    name: Анализ зависимостей backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Cache NVD database
        uses: actions/cache@v4
        with:
          path: ~/.cache/dependency-check-data
          key: dependency-check-nvd-${{ runner.os }}-weekly
          restore-keys: |
            dependency-check-nvd-${{ runner.os }}-

      - name: OWASP Dependency-Check
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: mvn -B dependency-check:check -Dodc.dataDirectory=$HOME/.cache/dependency-check-data

      - name: Загрузка отчёта
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sca-dependency-check-backend
          path: backend/target/dependency-check-report.html

  npm-sca:
    name: Анализ зависимостей frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chart_hedgehog
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: chart_hedgehog/package-lock.json

      - name: Установка зависимостей
        run: npm ci

      - name: npm audit
        run: npm audit --audit-level=high

      - name: Загрузка npm audit отчёта
        if: always()
        run: npm audit --json > npm-audit-report.json || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sca-npm-audit-frontend
          path: chart_hedgehog/npm-audit-report.json
