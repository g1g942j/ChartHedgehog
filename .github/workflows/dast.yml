name: Динамический анализ безопасности (DAST)

on:
  workflow_call:

permissions:
  contents: read

jobs:
  zap-backend:
    name: OWASP ZAP — сканирование backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Сборка backend
        working-directory: backend
        run: mvn -B package -DskipTests

      - name: Запуск backend
        working-directory: backend
        run: |
          java -jar target/*.jar \
            --spring.datasource.url=jdbc:h2:mem:testdb \
            --spring.datasource.driver-class-name=org.h2.Driver \
            --spring.jpa.database-platform=org.hibernate.dialect.H2Dialect \
            --spring.security.user.name=zap \
            --spring.security.user.password=zap &
          echo "Ожидание запуска приложения..."
          timeout 60 bash -c 'until curl -sf http://localhost:8080/actuator/health; do sleep 2; done'

      - name: OWASP ZAP — базовое сканирование
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: "http://localhost:8080"
          rules_file_name: ".github/zap/zap-rules.tsv"
          cmd_options: "-a -j"
          allow_issue_writing: false
          fail_action: false

      - name: Загрузка ZAP отчёта
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dast-zap-backend
          path: |
            report_html.html
            report_json.json

  zap-frontend:
    name: OWASP ZAP — сканирование frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: chart_hedgehog/package-lock.json

      - name: Установка зависимостей
        working-directory: chart_hedgehog
        run: npm ci

      - name: Сборка frontend
        working-directory: chart_hedgehog
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
        run: npm run build

      - name: Запуск frontend
        working-directory: chart_hedgehog
        run: |
          npm start &
          echo "Ожидание запуска frontend..."
          timeout 60 bash -c 'until curl -sf http://localhost:3000; do sleep 2; done'

      - name: OWASP ZAP — базовое сканирование
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: "http://localhost:3000"
          rules_file_name: ".github/zap/zap-rules.tsv"
          cmd_options: "-a -j"
          allow_issue_writing: false
          fail_action: false

      - name: Загрузка ZAP отчёта
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dast-zap-frontend
          path: |
            report_html.html
            report_json.json
