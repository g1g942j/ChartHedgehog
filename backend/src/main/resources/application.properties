spring.application.name=backend
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/diagramdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:pos}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Server
server.port=${PORT:8080}
server.servlet.session.timeout=86400s
server.servlet.session.cookie.max-age=86400s
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=${COOKIE_SECURE:true}
# ???????(SAST) ???????(1DAST) ???????(4DAST)
server.servlet.session.cookie.same-site=${COOKIE_SAME_SITE:None}
server.servlet.session.tracking-modes=COOKIE

# Logging
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=INFO
logging.level.com.example.backend=INFO
